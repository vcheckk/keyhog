[package]
name = "vyre-emit-naga"
version = "0.4.2"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Naga IR emitter for vyre KernelDescriptor. Produces wgpu-compatible compute shaders."
readme = "README.md"
repository = "https://github.com/santhsecurity/vyre"
homepage = "https://github.com/santhsecurity/vyre"
documentation = "https://docs.rs/vyre-emit-naga"
categories = ["compilers", "hardware-support"]
keywords = ["vyre", "naga", "wgpu", "shader"]

[lib]
name = "vyre_emit_naga"
path = "src/lib.rs"

[dependencies]
vyre-lower = { workspace = true }
naga = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
vyre-foundation = { workspace = true }
vyre-driver = { workspace = true }
vyre-spec = { workspace = true }
rustc-hash = { workspace = true }
inventory = { workspace = true }
serde_json.workspace = true
blake3 = { workspace = true }

[dev-dependencies]
vyre-libs = { workspace = true, features = ["c-parser"] }
