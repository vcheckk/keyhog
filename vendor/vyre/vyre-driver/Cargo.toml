[package]
name = "vyre-driver"
version = "0.4.2"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Driver layer: registry, runtime, pipeline, routing, diagnostics. Substrate-agnostic backend machinery. Part of the vyre GPU compiler."
readme = "README.md"
keywords = ["gpu", "compiler", "runtime", "registry", "vyre"]
categories = ["compilers", "hardware-support", "api-bindings"]
documentation = "https://docs.rs/vyre-driver"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[[test]]
name = "cache_invalidation_default"
path = "tests/cache_invalidation_default.rs"
required-features = ["self-substrate-adapters"]

[features]
default = []
self-substrate-adapters = ["dep:vyre-self-substrate"]

[dependencies]
vyre-foundation = { workspace = true }
vyre-self-substrate = { workspace = true, optional = true }
vyre-spec.workspace = true
vyre-macros.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
rustc-hash.workspace = true
smallvec.workspace = true
blake3.workspace = true
bytemuck.workspace = true
inventory.workspace = true
toml.workspace = true
arc-swap = "1.9.1"
lasso = { version = "0.7.3", features = ["multi-threaded"] }
dashmap.workspace = true
fs2.workspace = true

[lints]
workspace = true

[dev-dependencies]
vyre-reference = { workspace = true }
vyre-self-substrate = { workspace = true }
# The `vyre` meta-shim re-exports every driver-tier public type. Doctest
# examples in this crate demonstrate the consumer-facing `vyre::X` path
# (that's how consumers call them in production), so
# the shim must be in scope when doctests compile. Dev-dep only — the
# library itself has no runtime dependency on `vyre`.
vyre = { workspace = true }
tempfile.workspace = true
