[package]
name = "vyre-primitives"
version = "0.4.2"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Compositional primitives for vyre — marker types (always on) + Tier 2.5 LEGO substrate (feature-gated per domain)."
readme = "README.md"
keywords = ["gpu", "ir", "primitive", "vyre", "lego"]
categories = ["algorithms", "api-bindings"]
documentation = "https://docs.rs/vyre-primitives"

[features]
# Default: marker-types only, zero IR-builder deps. Consumers that
# need a Tier 2.5 builder enable the matching domain flag.
default = []

# Enable GPU-backend parity tests (requires CUDA driver + device).
gpu = []

# Enable host reference oracles for explicit parity harnesses. Release
# consumers should not enable this; CUDA/GPU dispatch builders remain
# available without host execution paths.
cpu-parity = []

# Internal marker feature — ON whenever any domain feature pulls
# vyre-foundation. Keeps `#[cfg]` expressions terse (one gate
# instead of `any(feature = "text", feature = "matching", …)`).
# AUDIT_2026-04-24 F-RANGE-03: replaces the previous dead
# `cfg(feature = "vyre-foundation")` which matched nothing.
vyre-foundation = ["dep:vyre-foundation"]

# Per-domain Tier 2.5 feature flags. See docs/primitives-tier.md.
# Every domain pulls vyre-foundation — every primitive ships CPU
# reference + GPU `fn(...) -> Program` builder together.
text = ["vyre-foundation"]
matching = ["vyre-foundation"]
decode = ["vyre-foundation"]
# Subgroup-cooperative NFA step (G1). Composes bitset + matching.
nfa = ["vyre-foundation", "bitset", "matching"]
math = ["vyre-foundation", "graph", "fixpoint"]
nn = ["vyre-foundation", "math"]
hash = ["vyre-foundation"]
parsing = ["vyre-foundation", "text", "matching"]
graph = ["vyre-foundation", "bitset", "reduce"]
bitset = ["vyre-foundation"]
reduce = ["vyre-foundation"]
label = ["vyre-foundation", "bitset"]
predicate = ["vyre-foundation", "graph", "bitset", "label"]
fixpoint = ["vyre-foundation", "bitset"]
# Geometric / Clifford algebra primitives (#8). Multivector products
# unify quaternions, dual quaternions, and projective transformations
# on a single substrate; reused by equivariant NNs (#33), physics
# simulation, robotics, 3D vision.
geom = ["vyre-foundation", "math"]
# Convex / combinatorial optimization primitives (#9, #14, #46).
opt = ["vyre-foundation", "math"]
# Effects-typed pipeline primitives (P-1.0-V1.x). Pure-data substrate
# for handler-applied effect rows; no IR-builder deps.
effects = []
# Type-discipline primitives (P-PRIM-14, …). Substructural type
# checks the foundation validate pipeline calls per buffer. Pure
# scalar ops, no IR-builder dep.
types = []
# Categorical primitives (P-PRIM-16/17/18). Yoneda / adjoint /
# Kan extension over finite categories. Pure scalar + Vec ops.
cat = []
# ZX-calculus rewrite primitives (P-PRIM-5). Spider fusion +
# identity removal + color change over discrete-phase diagrams.
zx = []
# d-DNNF compiler + GPU-shaped evaluator (P-PRIM-6).
dnnf = ["vyre-foundation", "graph"]
# Persistent homology + simplicial complex primitives (#15, #32).
topology = ["vyre-foundation", "math", "graph"]
visual = ["vyre-foundation"]

# Convenience aggregate — enable the entire Tier 2.5 substrate.
all-lego = [
    "text", "matching", "math", "nn", "hash", "parsing",
    "geom", "opt", "topology",
    "graph", "bitset", "reduce", "label", "predicate", "fixpoint", "decode",
    "nfa", "effects", "visual",
]

# Enable the `inventory::submit!(OpEntry { ... })` registrations so the
# universal conform harness + `cargo xtask print-composition` see every
# registered primitive. Off by default to keep default-build dep-free.
inventory-registry = ["dep:inventory", "vyre-foundation"]

[dependencies]
vyre-foundation = { workspace = true, optional = true }
vyre-spec.workspace = true
inventory = { workspace = true, optional = true }

[dev-dependencies]
vyre-reference = { workspace = true }
vyre-foundation.workspace = true
proptest.workspace = true
vyre-driver-cuda = { workspace = true }
vyre-driver = { workspace = true }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

