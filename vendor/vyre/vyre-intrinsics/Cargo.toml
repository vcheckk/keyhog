[package]
name = "vyre-intrinsics"
version = "0.4.2"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cat-C hardware intrinsics for vyre — ops that require a dedicated Naga emitter arm and dedicated vyre-reference eval arm. Pure fn(...) -> Program builders over vyre::ir::* live in vyre-libs or user crates, not here."
readme = "README.md"
keywords = ["gpu", "intrinsic", "ir", "vyre", "wgsl"]
categories = ["algorithms", "compilers", "hardware-support"]
documentation = "https://docs.rs/vyre-intrinsics"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
vyre-foundation = { workspace = true }
vyre-driver = { workspace = true }
vyre-spec.workspace = true
vyre-macros.workspace = true
serde.workspace = true
thiserror.workspace = true
tracing.workspace = true
rustc-hash.workspace = true
smallvec.workspace = true
inventory.workspace = true

[dev-dependencies]
criterion.workspace = true
vyre = { workspace = true }
vyre-reference = { workspace = true }

[features]
default = ["all", "subgroup-ops"]
all = ["hardware"]
hardware = []
subgroup-ops = ["vyre-reference/subgroup-ops"]

[lints]
workspace = true

