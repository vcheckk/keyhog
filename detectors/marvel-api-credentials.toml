# Docs: https://developer.marvel.com/documentation/authorization
# Format: Public/Private API key pair with MD5 hash authentication
# Verify: GET /v1/public/characters with ts, apikey, hash parameters
# Prefix: none (requires context anchoring)

[detector]
id = "marvel-api-credentials"
name = "Marvel API Credentials"
service = "marvel"
severity = "medium"
keywords = ["MARVEL", "marvel", "MARVEL_API_KEY"]

[[detector.patterns]]
regex = "(?:MARVEL|marvel)[_=:\\s\"'']+(?:private[_-]?)?api[_-]?key[=:\\s\"'']+([a-f0-9]{32})"
description = "Marvel API private key"
group = 1

[[detector.companions]]
name = "marvel_public_key"
regex = "(?:MARVEL|marvel)[_=:\\s\"'']+(?:public[_-]?)?api[_-]?key[=:\\s\"'']+([a-f0-9]{32})"
within_lines = 5
