# Kubernetes Secret manifest — DISABLED (structured parser handles this better).
#
# The structured preprocessor (`crates/scanner/src/structured/parsers.rs`)
# already extracts `data:` values, base64-decodes them, and appends
# `key: <decoded-value>` lines for the rest of the regex pipeline to
# scan. That gives EVERY downstream detector a shot at the decoded
# secret with the correct surfaced value — not the b64-encoded blob
# this detector previously emitted (which never overlapped the truth
# value in any benchmark comparator).
#
# This file is kept (vs deleted) so the keyhog-core embedded detector
# count stays stable and consumers can't accidentally pin against a
# removed-detector id. The regex is intentionally narrowed to a
# pattern that real k8s manifests never produce, ensuring zero
# findings while preserving the detector entry.

[detector]
id = "kubernetes-secret"
name = "Kubernetes Secret Value (legacy stub — handled by structured parser)"
service = "kubernetes"
severity = "info"
keywords = ["NEVER__MATCH__K8S_DISABLED"]

[[detector.patterns]]
# Never-matches sentinel: the literal marker below is not a substring
# of any real k8s YAML output. If we ever need to re-enable the
# inline kubernetes-secret regex, replace this with the original
# pattern AND ensure the engine emits the DECODED value (not the b64
# blob) for the finding's `credential` field.
regex = 'NEVER__MATCH__K8S_DISABLED__SENTINEL'
description = "Sentinel pattern — never matches in production."
