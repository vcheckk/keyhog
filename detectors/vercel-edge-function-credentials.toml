# Docs: https://vercel.com/docs/edge-config/vercel-api
# Format: ecfg_ prefix followed by alphanumeric characters for Edge Config ID; tokens are UUID-like strings
# Verify: GET /v1/edge-config/{id}/items with Bearer token returns 200 if valid
# Prefix: ecfg_

[detector]
id = "vercel-edge-function-credentials"
name = "Vercel Edge Function Credentials"
service = "vercel"
severity = "high"
keywords = ["EDGE_CONFIG", "VERCEL_EDGE", "ecfg_"]

[[detector.patterns]]
# Bounded the capture length: Vercel Edge Config IDs are 24-char
# strings (the docs spec is "alphanumeric with underscores/dashes,
# fixed length"). Capping at 8..=128 keeps the match recognisable
# without matching arbitrary multi-KB identifiers in the middle of
# longer strings. kimi-4 audit.
regex = "ecfg_[a-zA-Z0-9_-]{8,128}"
description = "Vercel Edge Config ID (ecfg_ prefix)"

[[detector.patterns]]
regex = "(?:EDGE_CONFIG|VERCEL_EDGE[_-]CONFIG)[=:\\s\"'']+(ecfg_[a-zA-Z0-9_-]{8,128})"
description = "Edge Config with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.vercel.com/v1/edge-config"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
