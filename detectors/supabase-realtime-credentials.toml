# Docs: https://supabase.com/docs/guides/realtime
# Format: JWT token (eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...) with Realtime URL
# Verify: WebSocket connection to Realtime endpoint
# Prefix: eyJ (JWT header, requires context anchoring for Realtime)

[detector]
id = "supabase-realtime-credentials"
name = "Supabase Realtime Credentials"
service = "supabase"
severity = "high"
keywords = ["SUPABASE_REALTIME_URL", "SUPABASE_REALTIME_KEY", "realtime.supabase.co"]

[[detector.patterns]]
regex = "SUPABASE_REALTIME_URL[=:\\s\"'']+(wss?://[a-z0-9-]+\\.supabase\\.co[:/]realtime[/v0-9]*)"
description = "Supabase Realtime WebSocket URL with context anchor"
group = 1

[[detector.patterns]]
regex = "SUPABASE_REALTIME_KEY[=:\\s\"'']+(eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*)"
description = "Supabase Realtime JWT key with context anchor"
group = 1

[[detector.patterns]]
# Bounded the bridge between the `realtime` keyword and the `url`
# field to 64 non-newline chars (Supabase env files keep
# `REALTIME_URL` on a single ALL_CAPS line) and capped the captured
# URL at 2048 chars per RFC 3986 practical max. kimi-4 audit.
regex = "realtime[^\\n]{0,64}url[=:\\s\"'']+(wss?://[^\\s\"'']{1,2048})"
description = "Supabase Realtime URL with loose context anchor"
group = 1
