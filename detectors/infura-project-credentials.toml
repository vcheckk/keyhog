# Docs: https://docs.infura.io/
# Format: Project ID and Secret are both 32 character hex strings
# Verify: GET to /v3/{project_id} with Basic auth (project_id:secret) returns 200 if valid
# Prefix: none (32 hex chars each, requires context keywords)

[detector]
id = "infura-project-credentials"
name = "Infura Project Credentials"
service = "infura"
severity = "critical"
keywords = ["infura", "INFURA", "INFURA_PROJECT_ID", "INFURA_PROJECT_SECRET", "infura.io"]

[[detector.patterns]]
regex = "(?:INFURA|infura)[_\\-\\.]?(?:PROJECT[_\\-\\.]?ID|project[_\\-\\.]?id)[=:\\s\\\"']+([a-f0-9]{32})"
description = "Infura Project ID with context anchor"
group = 1

[[detector.companions]]
name = "infura_project_secret"
regex = "(?:INFURA|infura)[_\\-\\.]?(?:PROJECT[_\\-\\.]?SECRET|project[_\\-\\.]?secret|API[_\\-\\.]?KEY[_\\-\\.]?SECRET|api[_\\-\\.]?key[_\\-\\.]?secret)[=:\\s\\\"']+([a-f0-9]{32})"
within_lines = 5
[detector.verify]
method = "POST"
url = "https://mainnet.infura.io/v3/{{match}}"

[detector.verify.auth]
type = "basic"
username = "match"
password = "companion.infura_project_secret"

[detector.verify.success]
status = 200
