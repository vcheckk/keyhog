# Docs: https://dev.wix.com/docs/build-apps/develop-your-app/access/authentication/authenticate-using-oauth
# Format: App ID (UUID format) + App Secret Key (long alphanumeric) + Instance ID
# Verify: https://dev.wix.com/docs/api-reference/app-management/app-instance/get-app-instance
# Prefix: none (requires context anchoring)

[detector]
id = "wix-api-credentials"
name = "Wix API Credentials"
service = "wix"
severity = "high"
keywords = ["wix", "WIX", "app_secret", "app_id", "instance_id", "wix_app"]

[[detector.patterns]]
regex = "(?:wix|WIX)[_=:\\s\"'']+(?:app[_-]?id|client[_-]?id)[=:\\s\"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "Wix App ID (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:wix|WIX)[_=:\\s\"'']+(?:app[_-]?secret|client[_-]?secret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Wix App Secret with context anchor"
group = 1

[[detector.companions]]
name = "instance_id"
regex = "(?:wix|WIX)[_=:\\s\"'']+(?:instance[_-]?id)[=:\\s\"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
within_lines = 5
[detector.verify]
method = "POST"
url = "https://www.wix.com/app-oauth2/v1/token"

[detector.verify.auth]
type = "basic"
username = "match"
password = "companion.instance_id"

[detector.verify.success]
status = 200
json_path = "access_token"
