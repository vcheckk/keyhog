# Docs: https://docs.digitalocean.com/reference/api/spaces/
# Format: 20-character alphanumeric access key ID and 43-character base64 secret key
# Verify: AWS Signature V4 against Spaces endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "digitalocean-spaces-credentials"
name = "DigitalOcean Spaces Credentials"
service = "digitalocean-spaces"
severity = "high"
keywords = ["DO_SPACES", "DIGITALOCEAN_SPACES", "SPACES_ACCESS_KEY", "SPACES_SECRET_KEY"]

[[detector.patterns]]
regex = "(?:DO[_-]?SPACES|DIGITALOCEAN[_-]?SPACES)[_\\s]*(?:ACCESS[_-]?KEY|KEY[_-]?ID)[=:\\s\"'']+([A-Z0-9]{20})"
description = "DigitalOcean Spaces access key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:DO[_-]?SPACES|DIGITALOCEAN[_-]?SPACES)[_\\s]*(?:SECRET[_-]?KEY|SECRET)[=:\\s\"'']+([A-Za-z0-9/+=]{40,44})"
description = "DigitalOcean Spaces secret key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:SPACES[_-]?ENDPOINT|DO[_-]?SPACES[_-]?ENDPOINT)[=:\\s\"'']+(https?://[a-z0-9]+\\.digitaloceanspaces\\.com)"
description = "DigitalOcean Spaces endpoint URL"
group = 1

[[detector.patterns]]
regex = "(?:SPACES[_-]?REGION|DO[_-]?SPACES[_-]?REGION)[=:\\s\"'']+(nyc3|ams3|sgp1|fra1|sfo3)"
description = "DigitalOcean Spaces region"
group = 1

[[detector.companions]]
name = "secret_key"
regex = "(?:SPACES[_-]?SECRET(?:[_-]?KEY)?|DO[_-]?SPACES[_-]?SECRET(?:[_-]?KEY)?|secret[_-]?access[_-]?key)[=:\\s\"']+([A-Za-z0-9/+=]{40,44})"
within_lines = 3
