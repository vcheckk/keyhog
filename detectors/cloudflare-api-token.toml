# Docs: https://developers.cloudflare.com/fundamentals/api/get-started/create-token/
# Format: 40 character alphanumeric with underscores and hyphens (e.g., 8a7b6c5d4e3f...)
# Verify: GET /client/v4/user/tokens/verify with Bearer auth returns 200 if valid
# Prefix: none (generic base64-like, requires keyword context)

[detector]
id = "cloudflare-api-token"
name = "Cloudflare API Token"
service = "cloudflare"
severity = "critical"
keywords = ["cloudflare", "CLOUDFLARE", "CF_API_TOKEN", "cloudflareApiToken"]

[[detector.patterns]]
regex = '''(?i)(?:cloudflare[_.-]?api[_.-]?token|cf[_.-]?api[_.-]?token|cloudflareApiToken)\s*[=:]\s*["']?([a-zA-Z0-9_-]{40})["']?'''
description = "Cloudflare API token with case-insensitive context anchor."
group = 1

[[detector.patterns]]
regex = '''CF_API_TOKEN[=:\s"']+([a-zA-Z0-9_-]{40})'''
description = "Cloudflare API token from CF_API_TOKEN env var."
group = 1

[detector.verify]
method = "GET"
url = "https://api.cloudflare.com/client/v4/user/tokens/verify"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
json_path = "success"
equals = "true"

[[detector.verify.metadata]]
name = "status"
json_path = "result.status"
