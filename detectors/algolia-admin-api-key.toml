# Docs: https://www.algolia.com/doc/guides/security/api-keys/
# Format: 32 character hexadecimal string (admin key has full permissions)
# Verify: none (requires paired application ID for verification)
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "algolia-admin-api-key"
name = "Algolia Admin API Key"
service = "algolia"
severity = "critical"
keywords = ["ALGOLIA_ADMIN_KEY", "algolia_admin_key", "admin_api_key", "ALGOLIA_API_KEY"]

[[detector.patterns]]
regex = "(?i)algolia[_.-]?admin[_.-]?(?:api[_.-]?)?key[=:\\s\"']+([a-f0-9]{32})"
description = "Algolia admin API key with context anchor"
group = 1

[[detector.patterns]]
regex = "admin_api_key[=:\\s\"']+([a-f0-9]{32})"
description = "Algolia admin key under the dedicated env-var name"
group = 1

[[detector.companions]]
name = "application_id"
regex = "(?:ALGOLIA_APP(?:LICATION)?_ID|algolia[_-]?app(?:lication)?[_-]?id|app[_-]?id)[=:\\s\"']+([A-Z0-9]{10})"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://{{companion.application_id}}-dsn.algolia.net/1/indexes"
# `{{companion.application_id}}` only fills the subdomain; pin the apex so a
# malicious capture can't redirect the X-Algolia-API-Key elsewhere.
allowed_domains = ["algolia.net"]

[detector.verify.auth]
type = "header"
name = "X-Algolia-API-Key"
template = "{{match}}"

[[detector.verify.headers]]
name = "X-Algolia-Application-Id"
value = "{{companion.application_id}}"

[detector.verify.success]
status = 200
