# Docs: https://developer.zuora.com/docs/guides/authentication
# Format: OAuth Client ID and Client Secret pair (client_id and client_secret)
# Verify: POST /oauth/token with client credentials returns 200 with access_token if valid
# Prefix: none (requires context anchoring)

[detector]
id = "zuora-api-credentials"
name = "Zuora API Credentials"
service = "zuora"
severity = "critical"
keywords = ["ZUORA", "zuora", "ZUORA_CLIENT_ID", "ZUORA_CLIENT_SECRET"]

[[detector.patterns]]
regex = "(?:ZUORA[_\\s]*CLIENT[_\\s]*ID|zuora[_\\s]*client[_\\s]*id)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Zuora OAuth Client ID with context anchor"
group = 1

[[detector.companions]]
name = "zuora_client_secret"
regex = "(?:ZUORA[_\\s]*CLIENT[_\\s]*SECRET|zuora[_\\s]*client[_\\s]*secret)[=:\\s\"'']+[a-f0-9]{32,64}"
within_lines = 5
