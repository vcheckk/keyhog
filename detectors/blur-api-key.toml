# Docs: https://blur.io/ (no public API documentation available)
# Format: API key for programmatic trading (limited public info)
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "blur-api-key"
name = "Blur API Key"
service = "blur"
severity = "high"
keywords = ["blur", "BLUR", "BLUR_API_KEY", "blur.io"]

[[detector.patterns]]
regex = "(?i)blur[_\\s]*(?:api[_\\s]*)?key[_\\s]*[=:][\\s]*[\"'']+([a-zA-Z0-9_-]{20,})[\"'']+"
description = "Blur API key in assignment context (case-insensitive)"
group = 1
