# Docs: https://documentation.jumio.ai/
# Format: OAuth2 Client ID and Client Secret, or Basic Auth with API token/secret
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "jumio-api-credentials"
name = "Jumio API Credentials"
service = "jumio"
severity = "high"
keywords = ["jumio", "api_token", "client_id", "client_secret"]

[[detector.patterns]]
regex = "(?:jumio|JUMIO)[_\\s]*(api[_\\s]*token|client[_\\s]*id)[=:;\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Jumio API token or Client ID with context anchor"
group = 2

[[detector.companions]]
name = "jumio_secret"
regex = "(?:jumio|JUMIO)[_\\s]*(api[_\\s]*secret|client[_\\s]*secret)[=:;\\s\"'']+([a-zA-Z0-9_-]{20,})"
within_lines = 5
