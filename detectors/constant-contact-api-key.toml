# Docs: https://developer.constantcontact.com/api_guide/getting_started.html
# Format: API Key (client ID) for V3 API, plus optional client secret and access token
# Verify: GET /v3/account_info with Bearer token returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "constant-contact-api-key"
name = "Constant Contact API Key"
service = "constantcontact"
severity = "critical"
keywords = ["constantcontact", "CONSTANTCONTACT", "constant_contact", "client_id", "client_secret"]

[[detector.patterns]]
regex = """(?i)constant[_-]?contact[_-]?(?:api[_-]?)?key[=:\\s\"']+([a-zA-Z0-9]{20,})"""
description = "Constant Contact API Key with context anchor"
group = 1

[[detector.patterns]]
regex = """(?i)constant[_-]?contact[_-]?(?:client[_-]?)?id[=:\\s\"']+([a-zA-Z0-9]{20,})"""
description = "Constant Contact Client ID"
group = 1

[[detector.patterns]]
regex = """(?i)constant[_-]?contact[_-]?(?:client[_-]?)?secret[=:\\s\"']+([a-zA-Z0-9_-]{20,})"""
description = "Constant Contact Client Secret"
group = 1

[[detector.patterns]]
regex = """(?i)constant[_-]?contact[_-]?(?:access[_-]?)?token[=:\\s\"']+([a-zA-Z0-9_-]{20,})"""
description = "Constant Contact Access Token"
group = 1
