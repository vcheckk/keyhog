# Docs: https://www.remitly.com/partners
# Format: API credentials typically consist of client ID and secret for OAuth2
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "remitly-api-credentials"
name = "Remitly API Credentials"
service = "remitly"
severity = "critical"
keywords = ["REMITLY", "remitly", "RemitlyClientId", "RemitlySecret"]

[[detector.patterns]]
regex = "(?:REMITLY|remitly)[_.]?(?:CLIENT_SECRET|client_secret|API_SECRET|api_secret|SECRET|secret)[=:\\s\"']+([a-zA-Z0-9_-]{20,})"
description = "Remitly API secret with context anchor"
group = 1

[[detector.companions]]
name = "Remitly client ID"
regex = "(?:REMITLY|remitly)[_.]?(?:CLIENT_ID|client_id|API_KEY|api_key)[=:\\s\"']+[a-zA-Z0-9_-]{16,}"
within_lines = 5
