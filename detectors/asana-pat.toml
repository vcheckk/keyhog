# Docs: https://developers.asana.com/docs/personal-access-token
# Format: 1/ followed by 16-20 digits, another /, and 32-48 alphanumeric chars
# Verify: GET request to Asana users/me endpoint with Bearer token
# Prefix: 1/

[detector]
id = "asana-pat"
name = "Asana Personal Access Token"
service = "asana"
severity = "high"
keywords = [
    "asana",
    "ASANA_ACCESS_TOKEN",
    "ASANA_PAT",
    "ASANA_TOKEN",
    "app.asana.com",
    "asana.com/api",
]

[[detector.patterns]]
regex = '1/[0-9]{16,20}/[a-zA-Z0-9]{32,48}'
description = "Asana personal access token (format: 1/user_id/token)"

[detector.verify]
method = "GET"
url = "https://app.asana.com/api/1.0/users/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "name"
json_path = "data.name"

[[detector.verify.metadata]]
name = "email"
json_path = "data.email"
