# Docs: https://devcenter.heroku.com/articles/platform-api-quickstart#authentication
# Format: UUID format (8-4-4-4-12 hex digits), used with HTTP Basic Auth username
# Verify: GET /account with Basic auth (username=key, password=empty) returns 200
# Prefix: none (UUID format, requires keyword context)

[detector]
id = "heroku-api-key"
name = "Heroku API Key"
service = "heroku"
severity = "critical"
keywords = ["HEROKU_API_KEY", "heroku_api_key", "Heroku API Key", "herokuApiKey"]

[[detector.patterns]]
regex = '''(?i)(?:HEROKU_API_KEY|heroku_api_key|herokuApiKey|heroku-api-key)\s*[=:]\s*["']?([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})["']?'''
description = "Heroku API key in env/yaml/json/kebab/camelCase context, UUID format."
group = 1

[[detector.patterns]]
regex = '''(?:heroku\.api\.key)\s*=\s*([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'''
description = "Heroku API key in INI/properties dotted-key context."
group = 1

[detector.verify]
method = "GET"
url = "https://api.heroku.com/account"

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "email"
json_path = "email"
