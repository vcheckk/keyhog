# Docs: https://docs.veracode.com/r/c_configure_api_credentials
# Format: API ID (20-25 char) and API Secret Key (40+ char) pair
# Verify: GET /api/auth/v1/self with Authorization header using HMAC
# Prefix: none (requires context anchoring for ID/Secret pair)

[detector]
id = "veracode-api-credentials"
name = "Veracode API Credentials"
service = "veracode"
severity = "critical"
keywords = ["VERACODE_API_KEY_ID", "VERACODE_API_KEY_SECRET", "veracode.com"]

[[detector.patterns]]
regex = "(?:VERACODE|veracode)(?:_?API)?(?:_?ID|_?KEY_ID)?[=:\\s\"'']+([a-f0-9]{20,25})"
description = "Veracode API Key ID with context anchor"
group = 1

[[detector.companions]]
name = "veracode_api_secret"
regex = "(?:VERACODE|veracode)(?:_?API)?(?:_?SECRET|_?KEY_SECRET)?[=:\\s\"'']+[a-f0-9]{40,}"
within_lines = 10
[detector.verify]
method = "GET"
url = "https://api.veracode.com/api/auth/v1/self"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "VERACODE-HMAC-SHA-256 {{match}}"

[detector.verify.success]
status = 200
