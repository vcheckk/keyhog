name: vendor-vyre

# Refresh vendor/vyre/ from the upstream Santh monorepo on every push
# to main, plus a daily cron as a safety net. If the refresh produces
# drift, commits it back with a `[vendor]` marker that the workflow
# itself skips, so there's no infinite loop.
#
# Manual runs (workflow_dispatch) accept a `ref` input to pin a
# specific upstream commit (e.g. `--ref vyre-v0.4.3`).

on:
  push:
    branches: [main]
  schedule:
    # 06:00 UTC daily — catches drift even when keyhog hasn't been
    # touched but vyre upstream has moved.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Upstream vyre ref (tag, branch, or SHA). Defaults to latest semver tag.'
        required: false
        default: ''

# One refresh at a time per branch; newer pushes cancel older
# in-flight refreshes cleanly.
concurrency:
  group: vendor-vyre-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    # Skip when the triggering push is itself a vendor refresh — this
    # is the loop-breaker. Marker is the literal `[vendor]` prefix on
    # the commit subject; the commit step below uses the same prefix.
    if: |
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, '[vendor]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: checkout keyhog
        uses: actions/checkout@v4
        with:
          # Use a token with write scope so the bot can push back.
          # SANTH_GITHUB_PAT lives in repo secrets; if absent the
          # commit step below falls back to a clear error.
          token: ${{ secrets.SANTH_GITHUB_PAT || github.token }}

      - name: clone Santh monorepo (vyre source of truth)
        id: clone_santh
        env:
          SANTH_GITHUB_PAT: ${{ secrets.SANTH_GITHUB_PAT }}
        run: |
          set -euo pipefail
          if [[ -z "${SANTH_GITHUB_PAT:-}" ]]; then
            # The vendor refresh is best-effort, NOT a hard CI gate.
            # If the keyhog repo doesn't have the optional
            # SANTH_GITHUB_PAT secret configured (e.g. on a fork, or
            # before an admin has added it), skip cleanly rather than
            # failing the whole workflow. The daily cron + the
            # workflow_dispatch path still work once the secret lands.
            echo "::warning::SANTH_GITHUB_PAT secret missing — skipping vendor refresh"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          # Shallow clone for speed; vendor-vyre.sh only needs the
          # current vyre tree at the chosen ref.
          git clone --depth 1 \
            "https://x-access-token:${SANTH_GITHUB_PAT}@github.com/santhsecurity/Santh.git" \
            /tmp/santh

      - name: run vendor-vyre.sh
        if: steps.clone_santh.outputs.skipped != 'true'
        env:
          VYRE_REPO: /tmp/santh/libs/performance/matching/vyre
          REF_INPUT: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          if [[ -n "${REF_INPUT:-}" ]]; then
            ./scripts/vendor-vyre.sh --ref "${REF_INPUT}"
          else
            ./scripts/vendor-vyre.sh
          fi

      - name: commit + push if drift
        if: steps.clone_santh.outputs.skipped != 'true'
        env:
          SANTH_GITHUB_PAT: ${{ secrets.SANTH_GITHUB_PAT }}
        run: |
          set -euo pipefail
          if git diff --quiet vendor/vyre/; then
            echo "no drift — vendor/vyre/ already matches upstream"
            exit 0
          fi
          # Identify any specific upstream commit captured in VENDOR_INFO.txt
          # so the commit message records exactly what landed.
          upstream_short=$(grep -E '^short:' vendor/vyre/VENDOR_INFO.txt | awk '{print $2}' || echo "unknown")
          upstream_subj=$(grep -E '^subject:' vendor/vyre/VENDOR_INFO.txt | cut -d: -f2- | sed 's/^ //' || echo "")

          git config user.name  'santh-vendor-bot'
          git config user.email 'bot@santh.dev'
          git add vendor/vyre/
          msg_file=$(mktemp)
          printf '%s\n\n' "[vendor] refresh vendor/vyre to ${upstream_short}" > "$msg_file"
          printf '%s\n\n' "${upstream_subj}" >> "$msg_file"
          printf '%s\n' "Automated drift commit from .github/workflows/vendor-vyre.yml." >> "$msg_file"
          printf '%s\n' "Re-apply hand-patches per vendor/vyre/PATCHES.md if any break." >> "$msg_file"
          git commit -F "$msg_file"
          git push
