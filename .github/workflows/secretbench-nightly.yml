name: secretbench-nightly

# Runs the secretbench mirror corpus through keyhog + trufflehog +
# gitleaks once a day and uploads the leaderboard JSON as an
# artifact. A run with `workflow_dispatch` also accepts override
# inputs for corpus size + seed so a reviewer can reproduce a
# specific scoreboard locally with the same seed.

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      positives:
        description: "Number of labeled positive fixtures"
        type: number
        default: 3000
      negatives:
        description: "Number of labeled negative fixtures"
        type: number
        default: 12000
      seed:
        description: "RNG seed for the mirror corpus"
        type: number
        default: 0

jobs:
  leaderboard:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Per-job permissions — see keyhog.yml header note. Top-level
    # `permissions:` rejected at dispatch time on this repo.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: secretbench

      - name: Build keyhog release binary
        run: cargo build --release -p keyhog --bin keyhog

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Install gitleaks
        run: |
          GL_VER="$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name | sed 's/^v//')"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run attribution self-tests (no scanners needed)
        run: python3 tools/secretbench/scoring/test_attribution.py

      - name: Generate mirror corpus
        env:
          POSITIVES: ${{ inputs.positives || 3000 }}
          NEGATIVES: ${{ inputs.negatives || 12000 }}
          SEED: ${{ inputs.seed || 0 }}
        run: |
          python3 tools/secretbench/mirror/generate.py \
            --out tools/secretbench/mirror/corpus \
            --positives "$POSITIVES" --negatives "$NEGATIVES" \
            --seed "$SEED"

      - name: Run leaderboard
        run: |
          PATH="$PWD/target/release:$PATH" \
            python3 tools/secretbench/scoring/leaderboard.py \
              --corpus tools/secretbench/mirror/corpus \
              --output tools/secretbench/results/leaderboard.json

      - name: Print one-line summary
        run: |
          python3 tools/secretbench/scoring/print_summary.py \
            tools/secretbench/results/leaderboard.json

      - name: Upload leaderboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: secretbench-leaderboard
          path: tools/secretbench/results/leaderboard.json
          retention-days: 30
